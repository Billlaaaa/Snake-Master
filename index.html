<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CFA Level 1 — Progress Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0c0c0e;
    --surface: #131316;
    --surface2: #1a1a1f;
    --surface3: #222228;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8e6df;
    --text2: #8a8880;
    --text3: #555450;
    --gold: #c9a84c;
    --gold2: #e8c97a;
    --gold-dim: rgba(201,168,76,0.12);
    --gold-dim2: rgba(201,168,76,0.06);
    --check: #c9a84c;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-weight: 400;
    min-height: 100vh;
    line-height: 1.6;
  }

  /* Subtle grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .layout {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 300px 1fr;
    min-height: 100vh;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
    padding: 36px 24px;
    gap: 32px;
  }

  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  .brand {
    display: flex; flex-direction: column; gap: 4px;
  }
  .brand-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-transform: uppercase;
  }
  .brand-title {
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
  }

  /* Global ring */
  .global-ring {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    padding: 24px 0;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .ring-wrap { position: relative; width: 120px; height: 120px; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .ring-pct {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 600;
    color: var(--text);
    line-height: 1;
  }
  .ring-label {
    font-size: 10px;
    color: var(--text3);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .global-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    width: 100%;
  }
  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    display: flex; flex-direction: column; gap: 2px;
  }
  .stat-val {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    color: var(--gold2);
    font-weight: 600;
  }
  .stat-key {
    font-size: 10px;
    color: var(--text3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Topic nav */
  .nav-label {
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    margin-bottom: 6px;
  }
  .nav-list { display: flex; flex-direction: column; gap: 2px; }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    border: 1px solid transparent;
  }
  .nav-item:hover { background: var(--surface2); }
  .nav-item.active {
    background: var(--gold-dim);
    border-color: rgba(201,168,76,0.2);
  }
  .nav-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--surface3);
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    transition: background 0.2s, border-color 0.2s;
  }
  .nav-item.active .nav-dot { background: var(--gold); border-color: var(--gold); }
  .nav-item.done .nav-dot { background: var(--gold); border-color: var(--gold); }
  .nav-name {
    font-size: 13px;
    color: var(--text2);
    flex: 1;
    transition: color 0.15s;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .nav-item.active .nav-name { color: var(--gold2); }
  .nav-pct {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }
  .nav-item.active .nav-pct { color: var(--gold); }

  /* ── MAIN ── */
  .main {
    padding: 48px 48px 80px;
    overflow-y: auto;
    height: 100vh; /* FIX: constrain main so scroll works properly */
  }
  .main::-webkit-scrollbar { width: 6px; }
  .main::-webkit-scrollbar-track { background: transparent; }
  .main::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* Topic header */
  .topic-header {
    margin-bottom: 40px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--border);
  }
  .topic-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 8px;
  }
  .topic-title {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 16px;
    line-height: 1.2;
  }
  .topic-meta {
    display: flex; gap: 24px; flex-wrap: wrap;
  }
  .topic-meta-item {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; color: var(--text2);
  }
  .topic-meta-item strong { color: var(--text); font-weight: 500; }

  /* Topic progress bar */
  .topic-progress-bar {
    margin-top: 20px;
    height: 3px;
    background: var(--surface3);
    border-radius: 99px;
    overflow: hidden;
  }
  .topic-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--gold), var(--gold2));
    border-radius: 99px;
    transition: width 0.4s ease;
  }

  /* Module */
  .module {
    margin-bottom: 36px;
  }
  .module-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px;
    cursor: pointer;
    user-select: none;
  }
  .module-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
  }
  .module-badge {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--gold);
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 2px 8px;
    border-radius: 99px;
    white-space: nowrap; /* FIX: prevent badge text wrapping */
  }
  .module-time {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap; /* FIX: prevent time text wrapping */
  }
  .module-chevron {
    width: 16px; height: 16px;
    color: var(--text3);
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  /* FIX: chevron rotation lives on .module-header now, not .module */
  .module.collapsed .module-header .module-chevron { transform: rotate(-90deg); }

  .module-bar {
    height: 2px;
    background: var(--surface3);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 14px;
  }
  .module-bar-fill {
    height: 100%;
    background: var(--gold);
    border-radius: 99px;
    transition: width 0.3s ease;
    opacity: 0.6;
  }

  /* FIX: hide the progress bar when module is collapsed */
  .module.collapsed .module-bar {
    display: none;
  }

  /* Accordion */
  .module-body {
    overflow: hidden;
    transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.25s ease;
    max-height: 4000px; /* FIX: increased from 2000px to handle large modules */
    opacity: 1;
  }
  .module.collapsed .module-body {
    max-height: 0;
    opacity: 0;
  }

  /* Subtopic grid */
  .subtopics {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    padding-bottom: 4px;
  }
  @media (max-width: 900px) { .subtopics { grid-template-columns: 1fr; } }

  .sub-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    user-select: none;
  }
  .sub-item:hover { background: var(--surface2); border-color: var(--border2); }
  .sub-item.done {
    background: var(--gold-dim2);
    border-color: rgba(201,168,76,0.15);
  }
  .sub-item.done .sub-title { color: var(--text3); text-decoration: line-through; text-decoration-color: var(--text3); }

  .check-box {
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 1.5px solid var(--border2);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, border-color 0.15s;
  }
  .sub-item.done .check-box {
    background: var(--gold);
    border-color: var(--gold);
  }
  .check-icon { display: none; }
  .sub-item.done .check-icon { display: block; }

  .sub-title {
    font-size: 12.5px;
    color: var(--text2);
    flex: 1;
    line-height: 1.4;
    transition: color 0.15s;
  }
  .sub-time {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    white-space: nowrap;
  }

  /* All-done state */
  .done-badge {
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--gold-dim);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold2);
    font-size: 11px;
    font-weight: 500;
    padding: 3px 10px;
    border-radius: 99px;
    letter-spacing: 0.04em;
  }

  /* Mark-all button */
  .mark-all-btn {
    background: none;
    border: 1px solid rgba(201,168,76,0.25);
    color: var(--gold);
    font-family: 'DM Sans', sans-serif;
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 99px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .mark-all-btn:hover {
    background: var(--gold-dim);
    border-color: rgba(201,168,76,0.5);
  }
  .mark-all-btn.undo {
    color: var(--text3);
    border-color: var(--border2);
  }
  .mark-all-btn.undo:hover {
    background: var(--surface2);
    color: var(--text2);
    border-color: var(--border2);
  }

  /* Reset btn */
  .reset-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--text3);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: color 0.15s, border-color 0.15s;
    margin-top: auto;
  }
  .reset-btn:hover { color: var(--text); border-color: var(--text2); }

  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; }
    .sidebar { position: static; height: auto; }
    .main { padding: 24px 20px 60px; height: auto; }
  }
</style>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

      <div class="ring-center">

    <div class="global-stats">
      <div class="stat-box">

      </div>

        <span class="stat-key">Hours Done</span>
      </div>
      <div class="stat-box">
        <span class="stat-val" id="stat-time">0h</span>
        <span class="stat-key">Total Length</span>
      </div>
    </div>
  </div>

  <div>
    <div class="nav-label">Subjects</div>
    <div class="nav-list" id="nav-list"></div>
  </div>

  <div id="sync-status" style="display:flex;align-items:center;font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;"></div>

</aside>

<main class="main" id="main-content"></main>

// ── STATE ──
const STORAGE_KEY = 'cfa_tracker_v1';
let progress = {};
let activeTopic = SYLLABUS[0].id;
let collapsedModules = {};
let _unsubscribe = null;
// FIX: track whether a cloud sync is in flight to debounce saves
let _saveTimer = null;

function setSyncStatus(s) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  const map = {
    connecting: ['#facc15', 'Connecting…'],
    synced:     ['#4ade80', 'Synced'],
    saving:     ['#facc15', 'Saving…'],
    offline:    ['#f87171', 'Offline — local only']
  };
  const [dot, text] = map[s] || map.synced;
  el.innerHTML = '<span style="width:6px;height:6px;border-radius:50%;background:'+dot+';display:inline-block;margin-right:5px;flex-shrink:0"></span>'+text;
}

function loadProgress() {
  try { progress = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); } catch(e) { progress = {}; }
}

// FIX: debounced save — batches rapid checkbox clicks into one Firestore write
function saveProgress() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
  if (!DOC_REF) return;
  clearTimeout(_saveTimer);
  setSyncStatus('saving');
  _saveTimer = setTimeout(async () => {
    try {
      // FIX: save the full progress object (not merge:true) so deletions/resets propagate correctly
      await DOC_REF.set({ progress, updatedAt: new Date().toISOString() });
      setSyncStatus('synced');
    } catch(e) {
      console.warn('Firestore write failed:', e.code, e.message);
      setSyncStatus('offline');
    }
  }, 800);
}

async function initCloud() {
  DOC_REF = db.collection('cfa_tracker').doc(PRIVATE_DOC_ID);
  try {
    const snap = await DOC_REF.get();
    if (snap.exists) {
      const cloud = snap.data().progress || {};
      // FIX: replace local with cloud entirely (cloud is source of truth on load)
      // This ensures resets and unchecks from other devices are respected
      const merged = Object.assign({}, cloud);
      // Keep any local keys not in cloud (offline changes while other device was used)
      let changed = false;
      Object.keys(progress).forEach(k => {
        if (!(k in merged)) { merged[k] = progress[k]; changed = true; }
      });
      progress = merged;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
      if (changed) await saveProgress(); // push locally-only keys up
      render();
    } else {
      // First ever open — push local progress up
      await DOC_REF.set({ progress, updatedAt: new Date().toISOString() });
    }
    setSyncStatus('synced');

    // Live listener: picks up changes from other devices in real time
    if (_unsubscribe) _unsubscribe();
    _unsubscribe = DOC_REF.onSnapshot(snap => {
      if (!snap.exists || snap.metadata.hasPendingWrites) return;
      const cloud = snap.data().progress || {};
      // FIX: do a deep equality check rather than key-by-key to catch deleted keys
      const localStr = JSON.stringify(progress);
      const cloudStr = JSON.stringify(cloud);
      if (localStr !== cloudStr) {
        progress = cloud;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(progress));
        render();
      }
    }, () => setSyncStatus('offline'));
  } catch(e) {
    console.warn('Firestore init failed:', e.code, e.message);
    setSyncStatus('offline');
  }
}

function resetAll() {
  if (!confirm('Reset all progress? This cannot be undone.')) return;
  progress = {};
  saveProgress();
  render();
}

// ── HELPERS ──
function fmtTime(mins) {
  if (!mins || mins === 0) return '0m'; // FIX: explicit zero guard
  const h = Math.floor(mins / 60), m = mins % 60;
  if (h === 0) return m + 'm';
  if (m === 0) return h + 'h';
  return h + 'h ' + m + 'm';
}

function getTopicStats(topic) {
  let total = 0, done = 0, mins = 0;
  topic.modules.forEach((mod, mi) => {
    mod.subtopics.forEach((sub, si) => {
      total++;
      mins += sub.m;
      if (progress[`${topic.id}-${mi}-${si}`]) done++;
    });
  });
  return { total, done, mins, pct: total ? Math.round(done / total * 100) : 0 };
}

function getGlobalStats() {
  let total = 0, done = 0, mins = 0, doneMins = 0;
  SYLLABUS.forEach(t => {
    t.modules.forEach((mod, mi) => {
      mod.subtopics.forEach((sub, si) => {
        total++;
        mins += sub.m;
        if (progress[`${t.id}-${mi}-${si}`]) { done++; doneMins += sub.m; }
      });
    });
  });
  return { total, done, mins, doneMins, pct: total ? Math.round(done / total * 100) : 0 };
}

// ── RENDER ──
// FIX: split render into sidebar-only and main-only updates to avoid unnecessary
// scroll resets when only a checkbox is toggled
function render() {
  renderSidebar();
  renderMain();
}

function renderSidebar() {
  const g = getGlobalStats();
  const circ = 314;
  const offset = circ - (circ * g.pct / 100);
  document.getElementById('global-ring-fill').setAttribute('stroke-dashoffset', offset);
  document.getElementById('global-pct').textContent = g.pct + '%';
  document.getElementById('stat-done').textContent = g.done;
  document.getElementById('stat-total').textContent = g.total;
  document.getElementById('stat-done-time').textContent = fmtTime(g.doneMins);
  document.getElementById('stat-time').textContent = fmtTime(g.mins);

  const nav = document.getElementById('nav-list');
  nav.innerHTML = SYLLABUS.map(t => {
    const s = getTopicStats(t);
    const isActive = t.id === activeTopic;
    // FIX: only mark done if total > 0 (prevents falsely marking empty topics)
    const isDone = s.done === s.total && s.total > 0;
    return `<div class="nav-item${isActive ? ' active' : ''}${isDone ? ' done' : ''}" onclick="setTopic('${t.id}')">
      <span class="nav-dot"></span>
      <span class="nav-name">${t.title}</span>
      <span class="nav-pct">${s.pct}%</span>
    </div>`;
  }).join('');
}

function renderMain() {
  const topic = SYLLABUS.find(t => t.id === activeTopic);
  const stats = getTopicStats(topic);
  const main = document.getElementById('main-content');

  // FIX: preserve scroll position across re-renders (only reset when topic changes)
  const savedScroll = main.scrollTop;

  const doneBadge = stats.done === stats.total && stats.total > 0
    ? `<span class="done-badge">✓ Complete</span>` : '';

  let html = `<div class="topic-header">
    <div class="topic-tag">CFA Level 1 · Subject ${SYLLABUS.findIndex(t => t.id === activeTopic) + 1} of ${SYLLABUS.length}</div>
    <div class="topic-title">${topic.title}</div>
    <div class="topic-meta">
      <span class="topic-meta-item"><strong>${stats.done}</strong>&nbsp;of&nbsp;<strong>${stats.total}</strong>&nbsp;videos done</span>
      <span class="topic-meta-item"><strong>${fmtTime(stats.mins)}</strong>&nbsp;content</span>
      <span class="topic-meta-item"><strong>${stats.pct}%</strong>&nbsp;complete</span>
      ${doneBadge}
    </div>
    <div class="topic-progress-bar"><div class="topic-progress-fill" style="width:${stats.pct}%"></div></div>
  </div>`;

  topic.modules.forEach((mod, mi) => {
    let modDone = 0, modTotal = mod.subtopics.length, modMins = 0;
    mod.subtopics.forEach((s, si) => {
      modMins += s.m;
      if (progress[`${topic.id}-${mi}-${si}`]) modDone++;
    });
    const modPct = modTotal ? Math.round(modDone / modTotal * 100) : 0;
    // Default collapsed unless explicitly opened
    const colKey = `${topic.id}-${mi}`;
    if (!(colKey in collapsedModules)) collapsedModules[colKey] = true;
    const isCollapsed = !!collapsedModules[colKey];
    const allDone = modDone === modTotal && modTotal > 0;

    html += `<div class="module${isCollapsed ? ' collapsed' : ''}">
      <div class="module-header" onclick="toggleModule('${topic.id}',${mi})">
        <span class="module-title">${mod.title}</span>
        <span class="module-badge">${allDone ? '✓ Done' : `${modDone}/${modTotal}`}</span>
        <span class="module-time">${fmtTime(modMins)}</span>
        <button class="mark-all-btn${allDone ? ' undo' : ''}" onclick="event.stopPropagation();markAllModule('${topic.id}',${mi},${allDone ? 'false' : 'true'})">${allDone ? '↺ Unmark all' : '✓ Mark all'}</button>
        <svg class="module-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6l4 4 4-4"/></svg>
      </div>
      <div class="module-bar"><div class="module-bar-fill" style="width:${modPct}%"></div></div>
      <div class="module-body">`;

    html += `<div class="subtopics">`;
    mod.subtopics.forEach((sub, si) => {
      const key = `${topic.id}-${mi}-${si}`;
      const isDone = !!progress[key];
      html += `<div class="sub-item${isDone ? ' done' : ''}" onclick="toggleSub('${key}')">
        <div class="check-box">
          <svg class="check-icon" width="10" height="10" viewBox="0 0 10 10" fill="none">
            <polyline points="1.5,5 4,7.5 8.5,2" stroke="#0c0c0e" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="sub-title">${sub.t}</span>
        <span class="sub-time">${sub.m}m</span>
      </div>`;
    });
    html += `</div></div></div>`; // subtopics + module-body + module
  });

  main.innerHTML = html;
  // FIX: restore scroll position after innerHTML update
  main.scrollTop = savedScroll;
}

function setTopic(id) {
  activeTopic = id;
  // FIX: reset scroll to top only when the topic actually changes
  document.getElementById('main-content').scrollTop = 0;
  render();
}

function toggleSub(key) {
  progress[key] = !progress[key];
  saveProgress();
  // FIX: update UI efficiently — flip the class on the element directly
  // instead of a full re-render which resets scroll and causes flicker
  const el = document.querySelector(`.sub-item[onclick="toggleSub('${CSS.escape(key)}')"]`);
  if (el) {
    el.classList.toggle('done', !!progress[key]);
  }
  // Still need to update sidebar stats and topic header counts
  renderSidebar();
  updateTopicHeader();
}

// FIX: lightweight header refresh — only updates the counts/progress bar without re-rendering all cards
function updateTopicHeader() {
  const topic = SYLLABUS.find(t => t.id === activeTopic);
  const stats = getTopicStats(topic);
  // Re-render only the header section
  const header = document.querySelector('.topic-header');
  if (!header) return;
  const doneBadge = stats.done === stats.total && stats.total > 0
    ? `<span class="done-badge">✓ Complete</span>` : '';
  header.innerHTML = `
    <div class="topic-tag">CFA Level 1 · Subject ${SYLLABUS.findIndex(t => t.id === activeTopic) + 1} of ${SYLLABUS.length}</div>
    <div class="topic-title">${topic.title}</div>
    <div class="topic-meta">
      <span class="topic-meta-item"><strong>${stats.done}</strong>&nbsp;of&nbsp;<strong>${stats.total}</strong>&nbsp;videos done</span>
      <span class="topic-meta-item"><strong>${fmtTime(stats.mins)}</strong>&nbsp;content</span>
      <span class="topic-meta-item"><strong>${stats.pct}%</strong>&nbsp;complete</span>
      ${doneBadge}
    </div>
    <div class="topic-progress-bar"><div class="topic-progress-fill" style="width:${stats.pct}%"></div></div>`;
  // Also update module badges for this topic
  const topic_obj = SYLLABUS.find(t => t.id === activeTopic);
  const moduleEls = document.querySelectorAll('#main-content .module');
  topic_obj.modules.forEach((mod, mi) => {
    let modDone = 0, modTotal = mod.subtopics.length;
    mod.subtopics.forEach((s, si) => {
      if (progress[`${activeTopic}-${mi}-${si}`]) modDone++;
    });
    const allDone = modDone === modTotal && modTotal > 0;
    const badge = moduleEls[mi] && moduleEls[mi].querySelector('.module-badge');
    if (badge) {
      badge.textContent = allDone ? '✓ Done' : `${modDone}/${modTotal}`;
    }
    const markBtn = moduleEls[mi] && moduleEls[mi].querySelector('.mark-all-btn');
    if (markBtn) {
      markBtn.textContent = allDone ? '↺ Unmark all' : '✓ Mark all';
      markBtn.classList.toggle('undo', allDone);
      markBtn.setAttribute('onclick', `event.stopPropagation();markAllModule('${activeTopic}',${mi},${allDone ? 'false' : 'true'})`);
    }
    const barFill = moduleEls[mi] && moduleEls[mi].querySelector('.module-bar-fill');
    if (barFill) {
      const modPct = modTotal ? Math.round(modDone / modTotal * 100) : 0;
      barFill.style.width = modPct + '%';
    }
  });
}

// FIX: toggleModule now only flips the CSS class — no DOM queries with fragile index math
function toggleModule(topicId, mi) {
  const key = `${topicId}-${mi}`;
  collapsedModules[key] = !collapsedModules[key];
  // Find the exact module element by its position among siblings
  const moduleEls = document.querySelectorAll('#main-content .module');
  if (moduleEls[mi]) {
    moduleEls[mi].classList.toggle('collapsed', !!collapsedModules[key]);
  }
}

function markAllModule(topicId, mi, markDone) {
  const topic = SYLLABUS.find(t => t.id === topicId);
  if (!topic) return;
  const mod = topic.modules[mi];
  if (!mod) return;
  mod.subtopics.forEach((sub, si) => {
    const key = `${topicId}-${mi}-${si}`;
    progress[key] = markDone ? true : false;
    if (!markDone) delete progress[key];
  });
  saveProgress();
  render();
}

// ── INIT ──
loadProgress();
render();
setSyncStatus('connecting');

auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL).then(() => {
  const existing = auth.currentUser;
  if (existing) return initCloud();
  return auth.signInAnonymously().then(() => initCloud());
}).catch(e => {
  console.warn('Auth failed:', e.code, e.message);
  setSyncStatus('offline');
});
</script>
